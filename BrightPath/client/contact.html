<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrightPath - Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="dashboard-container">
        <nav class="dashboard-nav">
            <div class="logo"><a href="index.html" style="color: white; text-decoration: none;">BrightPath</a></div>
            <div style="display: flex; gap: 1rem;">
                <a href="dashboard.html" class="cta-button"
                    style="padding: 0.5rem 1rem; font-size: 0.9rem; background: transparent; border: 1px solid white; color: white;">Dashboard</a>
            </div>
        </nav>

        <main class="hero-section" style="max-width: 600px; margin: 0 auto;">
            <h1 class="tagline" style="font-size: 3rem; margin-bottom: 1rem;">Contact Us</h1>
            <div class="exam-card" style="padding: 2rem; background: rgba(255,255,255,0.15);">
                <form>
                    <div style="margin-bottom: 1.5rem; text-align: left;">
                        <label style="display: block; margin-bottom: 0.5rem;">Your Name</label>
                        <input type="text" placeholder="John Doe"
                            style="width: 100%; padding: 0.8rem; border-radius: 8px; border: none;">
                    </div>
                    <div style="margin-bottom: 1.5rem; text-align: left;">
                        <label style="display: block; margin-bottom: 0.5rem;">Your Email</label>
                        <input type="email" placeholder="name@example.com"
                            style="width: 100%; padding: 0.8rem; border-radius: 8px; border: none;">
                    </div>
                    <div style="margin-bottom: 1.5rem; text-align: left;">
                        <label style="display: block; margin-bottom: 0.5rem;">Message</label>
                        <textarea rows="5" placeholder="How can we help you?"
                            style="width: 100%; padding: 0.8rem; border-radius: 8px; border: none; font-family: inherit;"></textarea>
                    </div>
                    <button type="button" class="cta-button" style="width: 100%;"
                        onclick="alert('Message sent! We will get back to you shortly.')">Send Message</button>
                </form>
            </div>
        </main>

        <div class="background-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
        </div>
    </div>
</body>

</html>
