<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrightPath - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 2rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .login-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            font-family: inherit;
        }

        .login-btn {
            width: 100%;
            margin-top: 1rem;
        }

        .back-link {
            display: block;
            margin-top: 1.5rem;
            color: white;
            opacity: 0.7;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <h2 class="login-title" id="form-title">Welcome Back</h2>
            
            <div style="display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem;">
                <button id="tab-login" class="filter-btn active" style="flex: 1;">Login</button>
                <button id="tab-register" class="filter-btn" style="flex: 1;">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="input-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="cta-button login-btn">Login</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" style="display: none;">
                <div class="input-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="cta-button login-btn">Sign Up</button>
            </form>

            <div id="error-msg" style="color: #ffcccc; margin-top: 1rem; display: none;"></div>
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
    </div>

    <!-- Reuse background shapes -->
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';
        
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const formTitle = document.getElementById('form-title');
        const errorMsg = document.getElementById('error-msg');

        // Tab Switching
        tabLogin.onclick = () => {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            formTitle.textContent = 'Welcome Back';
            errorMsg.style.display = 'none';
        };

        tabRegister.onclick = () => {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            tabLogin.classList.remove('active');
            tabRegister.classList.add('active');
            formTitle.textContent = 'Create Account';
            errorMsg.style.display = 'none';
        };

        // Handle Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('brightpath_bookmarks', JSON.stringify(data.user.bookmarks || []));
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.textContent = data.message || 'Login failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Connection error. Please try again.';
                errorMsg.style.display = 'block';
            }
        });

        // Handle Registration
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('brightpath_bookmarks', JSON.stringify([]));
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.textContent = data.message || 'Registration failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Connection error. Please try again.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
