<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrightPath - Global Community</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .community-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .comment-card {
            background: rgba(0, 0, 0, 0.4);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }
        
        .comment-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.3);
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .comment-author {
            font-weight: 600;
            color: var(--accent-color);
            font-size: 1.1rem;
        }

        .comment-category {
            background: rgba(255,255,255,0.2);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .comment-text {
            font-size: 1rem;
            line-height: 1.5;
            opacity: 0.9;
        }

        .comment-time {
            font-size: 0.8rem;
            opacity: 0.5;
            margin-top: 0.5rem;
        }

        .post-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .post-form textarea {
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.9);
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        .post-form select {
            padding: 0.8rem;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.9);
            font-family: inherit;
        }
        
        .filter-section {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            align-items: center;
        }
        
        .filter-section select {
            padding: 0.5rem;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.9);
            font-family: inherit;
        }
    </style>
</head>

<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <!-- Navigation -->
    <nav style="padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);">
        <div class="logo" style="color: white; font-size: 1.5rem; font-weight: 700;">BrightPath</div>
        <div style="display: flex; gap: 1.5rem; align-items: center;">
            <a href="dashboard.html" style="color: white; text-decoration: none; font-weight: 600; opacity: 0.8;">Dashboard</a>
            <a href="calendar.html" style="color: white; text-decoration: none; font-weight: 600; opacity: 0.8;">Calendar</a>
            <a href="community.html" style="color: var(--accent-color); text-decoration: none; font-weight: 600;">Community</a>
        </div>
    </nav>

    <div class="community-container">
        <h2 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Global Discussion Hub</h2>
        <p style="opacity: 0.8; margin-bottom: 2rem;">Ask questions, share test-prep tips, and connect with other students.</p>

        <!-- Post Form -->
        <div class="post-form" id="post-section">
            <h3 style="margin-bottom: 0.5rem; font-weight: 400;">Start a Discussion</h3>
            <textarea id="comment-text" placeholder="What's on your mind? Ask a question or share a tip..." required></textarea>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <select id="comment-category" required>
                    <option value="" disabled selected>Target Category...</option>
                    <option value="All Exams">General Advice</option>
                    <option value="Medical">Medical (NEET, AIIMS)</option>
                    <option value="Engineering">Engineering (JEE, BITSAT)</option>
                    <option value="Government">Government (UPSC, SSC)</option>
                    <option value="Management">Management (CAT, XAT)</option>
                    <option value="Law">Law (CLAT)</option>
                    <option value="Design">Design (NIFT)</option>
                </select>
                <button id="submit-post" class="cta-button" style="padding: 0.8rem 2rem; flex-grow: 1;">Post Discussion</button>
            </div>
            <div id="auth-warning" style="color: #ffcccc; display: none; margin-top: 0.5rem;">You must be logged in to post on the community board.</div>
        </div>

        <!-- Filters -->
        <div class="filter-section">
            <span style="font-weight: 600;">Filter Discussions By Category:</span>
            <select id="filter-category">
                <option value="All Exams">All Discussions</option>
                <option value="Medical">Medical Only</option>
                <option value="Engineering">Engineering Only</option>
                <option value="Government">Government Only</option>
                <option value="Management">Management Only</option>
                <option value="Law">Law Only</option>
                <option value="Design">Design Only</option>
            </select>
        </div>

        <!-- Comments Feed -->
        <div id="comments-feed">
            <div style="text-align: center; padding: 2rem; opacity: 0.7;">Loading discussions...</div>
        </div>
    </div>

    <script src="community.js"></script>
</body>
</html>
